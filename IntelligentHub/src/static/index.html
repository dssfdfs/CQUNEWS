<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelligentHub - 智能新闻聚合</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            padding: 30px;
            margin-bottom: 30px;
        }
        .input-group {
            display: flex;
            gap: 15px;
        }
        .input-group input {
            flex: 1;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            border-color: #667eea;
        }
        .btn {
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .result-card {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .result-card.success {
            border-left-color: #28a745;
        }
        .result-card.error {
            border-left-color: #dc3545;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }
        .status-badge.kept {
            background: #d4edda;
            color: #155724;
        }
        .status-badge.rejected {
            background: #f8d7da;
            color: #721c24;
        }
        .score {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        .summary {
            margin-top: 15px;
            line-height: 1.8;
            color: #333;
            font-size: 15px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .history-section {
            margin-top: 40px;
        }
        .history-section h2 {
            color: white;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        .article-list {
            display: grid;
            gap: 20px;
        }
        .article-item {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        .article-item:hover {
            transform: translateY(-3px);
        }
        .article-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .article-title {
            font-weight: 600;
            color: #333;
            word-break: break-all;
            flex: 1;
            margin-right: 15px;
        }
        .article-url {
            color: #666;
            font-size: 13px;
            word-break: break-all;
            margin-top: 5px;
        }
        .article-summary {
            color: #555;
            font-size: 14px;
            line-height: 1.6;
            margin-top: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .article-meta {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            font-size: 13px;
            color: #888;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
            background: white;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>IntelligentHub</h1>
            <p>智能新闻聚合与摘要系统</p>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 20px; color: #333;">抓取新闻</h2>
            <div class="input-group">
                <input type="url" id="urlInput" placeholder="请输入新闻链接，例如：https://news.sina.com.cn/c/xxx.shtml" />
                <button class="btn btn-primary" id="submitBtn" onclick="submitUrl()">
                    <span id="btnText">抓取并分析</span>
                    <span id="btnLoading" class="loading" style="display: none;"></span>
                </button>
            </div>
            <div id="resultArea"></div>
        </div>

        <div class="history-section">
            <h2>历史记录</h2>
            <div id="historyArea"></div>
        </div>
    </div>

    <script>
        const API_KEY = "1234";
        const API_BASE = window.location.origin;

        async function submitUrl() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                alert('请输入新闻链接');
                return;
            }

            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');
            const resultArea = document.getElementById('resultArea');

            btn.disabled = true;
            btnText.textContent = '';
            btnLoading.style.display = 'inline-block';
            resultArea.innerHTML = '';

            try {
                const response = await fetch(`${API_BASE}/ingest`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': API_KEY
                    },
                    body: JSON.stringify({ url })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                displayResult(data);
                loadHistory();
            } catch (error) {
                resultArea.innerHTML = `
                    <div class="result-card error">
                        <div style="color: #dc3545; font-weight: 600; margin-bottom: 10px;">❌ 处理失败</div>
                        <div style="color: #666; font-size: 14px;">${error.message}</div>
                    </div>
                `;
            } finally {
                btn.disabled = false;
                btnText.textContent = '抓取并分析';
                btnLoading.style.display = 'none';
            }
        }

        function displayResult(data) {
            const resultArea = document.getElementById('resultArea');
            const isKept = data.kept;
            const score = data.score?.toFixed(2) || '0.00';
            const summary = data.summary || '无摘要';
            const textLength = data.debug_article?.text_length || 0;

            resultArea.innerHTML = `
                <div class="result-card ${isKept ? 'success' : ''}">
                    <div class="result-header">
                        <div>
                            <span class="status-badge ${isKept ? 'kept' : 'rejected'}">
                                ${isKept ? '✓ 保留' : '✗ 拒绝'}
                            </span>
                        </div>
                        <div class="score">评分: ${score}</div>
                    </div>
                    <div style="color: #666; font-size: 14px; margin-bottom: 10px;">
                        正文长度: ${textLength} 字符
                    </div>
                    <div class="summary">
                        <strong style="color: #333;">摘要:</strong><br>
                        ${summary}
                    </div>
                </div>
            `;
        }

        async function loadHistory() {
            const historyArea = document.getElementById('historyArea');

            try {
                const response = await fetch(`${API_BASE}/articles`, {
                    headers: { 'x-api-key': API_KEY }
                });

                if (!response.ok) {
                    throw new Error('加载失败');
                }

                const articles = await response.json();

                if (!articles || articles.length === 0) {
                    historyArea.innerHTML = `
                        <div class="empty-state">
                            <div style="font-size: 48px; margin-bottom: 15px;">📰</div>
                            <div>暂无历史记录</div>
                            <div style="font-size: 14px; margin-top: 5px;">输入新闻链接开始分析</div>
                        </div>
                    `;
                    return;
                }

                historyArea.innerHTML = `
                    <div class="article-list">
                        ${articles.map(article => `
                            <div class="article-item">
                                <div class="article-header">
                                    <div class="article-title">${article.title || article.url.split('/').pop()}</div>
                                    <span class="status-badge ${article.kept ? 'kept' : 'rejected'}">
                                        ${article.kept ? '保留' : '拒绝'}
                                    </span>
                                </div>
                                <div class="article-url">${article.url}</div>
                                <div class="article-summary">${article.summary || '无摘要'}</div>
                                <div class="article-meta">
                                    <span>评分: ${(article.score || 0).toFixed(2)}</span>
                                    <span>字数: ${article.text?.length || 0}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (error) {
                historyArea.innerHTML = `<div class="empty-state">加载历史失败: ${error.message}</div>`;
            }
        }

        window.addEventListener('DOMContentLoaded', loadHistory);
    </script>
</body>
</html>
