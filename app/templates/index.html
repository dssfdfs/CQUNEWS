<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CQUNEWS新闻聚合分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.css" rel="stylesheet">
        <link href="/static/css/style.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div id="login-page" class="page">
            <div class="login-container">
                <div class="login-left">
                    <div class="login-logo">
                        <i class="fa-solid fa-newspaper"></i>
                        <h1>新闻内容摘要与标题生成系统</h1>
                    </div>
                    <div class="login-illustration">
                        <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=modern%20news%20aggregation%20dashboard%20with%20charts%20and%20articles%20blue%20gradient%20background&image_size=landscape_16_9" alt="新闻摘要系统">
                    </div>
                </div>
                <div class="login-right">
                    <div class="login-card">
                        <div class="login-header">
                            <h2>用户登录</h2>
                            <p>欢迎回来，请登录您的账号</p>
                        </div>
                        <form id="login-form">
                            <div class="form-group">
                                <label for="username">用户名</label>
                                <input type="text" id="username" class="form-control" placeholder="请输入用户名" required>
                            </div>
                            <div class="form-group">
                                <label for="password">密码</label>
                                <div class="password-input-group">
                                    <input type="password" id="password" class="form-control" placeholder="请输入密码" required>
                                    <button type="button" id="toggle-password" class="toggle-password-btn">
                                        <i class="fa-solid fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="captcha">验证码</label>
                                <div class="captcha-input-group">
                                    <input type="text" id="captcha" class="form-control captcha-input" placeholder="请输入4位验证码" required maxlength="4">
                                    <div id="captcha-image" class="captcha-image">
                                        <span id="captcha-text">4523</span>
                                    </div>
                                </div>
                            </div>
                            <div class="form-group form-check">
                                <input type="checkbox" id="remember-me" class="form-check-input">
                                <label for="remember-me" class="form-check-label">记住我</label>
                                <a href="/forgot_password" id="forgot-password-link" class="forgot-password-link">忘记密码？</a>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">登录</button>
                            <div class="register-link">
                                还没有账号？<a href="/register" id="register-link">立即注册</a>
                            </div>
                            <div class="admin-link">
                                <a href="/auth/admin-login-page" id="admin-login-link">管理员登录</a>
                            </div>
                        </form>
                        <div id="login-error" class="error-message"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="main-page" class="page hidden">
            <nav class="sidebar">
                <div class="sidebar-header">
                    <i class="fa-solid fa-newspaper"></i>
                    <span>CQUNEWS</span>
                </div>
                <ul class="sidebar-menu">
                    <li class="menu-item active" data-page="news">
                        <i class="fa-solid fa-newspaper"></i>
                        <span>新闻情报</span>
                    </li>
                    <li class="menu-item" data-page="history">
                        <i class="fa-solid fa-history"></i>
                        <span>新闻历史</span>
                    </li>
                    <li class="menu-item" data-page="analysis">
                        <i class="fa-solid fa-chart-line"></i>
                        <span>舆情分析</span>
                    </li>
                    <li class="menu-item" data-page="summary">
                        <i class="fa-solid fa-file-text"></i>
                        <span>智能摘要</span>
                    </li>
                </ul>
                <div class="sidebar-footer">
                </div>
            </nav>

            <main class="main-content">
                <header class="top-bar">
                    <div class="search-box">
                        <i class="fa-solid fa-search"></i>
                        <input type="text" id="search-input" placeholder="搜索新闻...">
                        <button id="search-btn" class="btn btn-primary">搜索</button>
                    </div>
                    <div class="user-menu">
                        <button id="user-avatar-btn" class="user-avatar">
                            <i class="fa-solid fa-user-circle"></i>
                            <span id="user-name">用户</span>
                        </button>
                        <div id="user-dropdown" class="user-dropdown hidden">
                            <div class="dropdown-header">
                                <strong id="dropdown-username">用户名</strong>
                                <span id="dropdown-role" class="badge bg-primary">角色</span>
                            </div>
                            <div class="dropdown-divider"></div>
                            <button class="dropdown-item" id="menu-sources">
                                <i class="fa-solid fa-globe"></i> 信源管理
                            </button>
                            <button class="dropdown-item" id="menu-user-management">
                                <i class="fa-solid fa-users-cog"></i> 用户管理
                            </button>
                            <div class="dropdown-divider"></div>
                            <button class="dropdown-item text-danger" id="logout-btn">
                                <i class="fa-solid fa-sign-out-alt"></i> 退出登录
                            </button>
                        </div>
                    </div>
                </header>

                <div id="news-page" class="content-page">
                    <div class="page-header">
                        <h2>新闻情报</h2>
                        <div class="filter-bar">
                            <input type="text" id="filter-keyword" placeholder="关键词">
                            <input type="date" id="filter-start-date">
                            <input type="date" id="filter-end-date">
                            <select id="filter-source">
                                <option value="">全部信源</option>
                            </select>
                            <button id="filter-btn" class="btn btn-secondary">筛选</button>
                        </div>
                    </div>
                    <div class="stats-cards">
                        <div class="stat-card">
                            <div class="stat-icon bg-primary"><i class="fa-solid fa-newspaper"></i></div>
                            <div class="stat-info">
                                <div class="stat-value" id="stat-total">0</div>
                                <div class="stat-label">总新闻数</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon bg-success"><i class="fa-solid fa-thumbs-up"></i></div>
                            <div class="stat-info">
                                <div class="stat-value" id="stat-positive">0</div>
                                <div class="stat-label">正面新闻</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon bg-danger"><i class="fa-solid fa-thumbs-down"></i></div>
                            <div class="stat-info">
                                <div class="stat-value" id="stat-negative">0</div>
                                <div class="stat-label">负面新闻</div>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon bg-warning"><i class="fa-solid fa-balance-scale"></i></div>
                            <div class="stat-info">
                                <div class="stat-value" id="stat-neutral">0</div>
                                <div class="stat-label">中性新闻</div>
                            </div>
                        </div>
                    </div>
                    <div class="charts-row">
                        <div class="chart-card">
                            <h3>新闻趋势</h3>
                            <div id="daily-chart" class="chart-container"></div>
                        </div>
                        <div class="chart-card">
                            <h3>信源分布</h3>
                            <div id="source-chart" class="chart-container"></div>
                        </div>
                    </div>
                    <div class="charts-row">
                        <div class="chart-card">
                            <h3>舆情趋势</h3>
                            <div id="sentiment-chart" class="chart-container"></div>
                        </div>
                        <div class="chart-card">
                            <h3>热点关键词</h3>
                            <div id="keywords-chart" class="chart-container"></div>
                        </div>
                    </div>
                    <div class="news-section">
                        <h3>最新新闻</h3>
                        <div id="news-list" class="news-list">
                        </div>
                        <div id="news-pagination" class="pagination"></div>
                    </div>
                </div>

                <div id="history-page" class="content-page hidden">
                    <div class="page-header">
                        <h2>新闻历史</h2>
                        <div class="header-actions">
                            <button id="delete-selected-btn" class="btn btn-danger" disabled>
                                <i class="fa-solid fa-trash"></i> 删除选中
                            </button>
                            <button id="clear-all-btn" class="btn btn-outline-danger">
                                <i class="fa-solid fa-broom"></i> 清空全部
                            </button>
                        </div>
                    </div>
                    <div id="history-list" class="history-list">
                    </div>
                </div>

                <div id="sources-page" class="content-page hidden">
                    <div class="page-header">
                        <h2>信源管理</h2>
                        <div class="header-actions">
                            <button id="add-source-btn" class="btn btn-primary">添加信源</button>
                            <button id="crawl-url-btn" class="btn btn-success">直接爬取网址</button>
                        </div>
                    </div>
                    <div id="sources-list" class="sources-list">
                    </div>
                </div>

                <div id="user-management-page" class="content-page hidden">
                    <div class="page-header">
                        <h2>用户管理</h2>
                        <button id="add-user-btn" class="btn btn-primary">添加用户</button>
                    </div>
                    <div id="users-list" class="users-list">
                    </div>
                </div>

                <div id="analysis-page" class="content-page hidden">
                    <div class="page-header">
                        <h2>舆情分析</h2>
                    </div>
                    <div class="analysis-grid">
                        <div class="analysis-card">
                            <h3>热点关键词</h3>
                            <div id="hot-keywords" class="keywords-list"></div>
                        </div>
                        <div class="analysis-card">
                            <h3>词云数据</h3>
                            <div id="word-cloud" class="word-cloud-container"></div>
                        </div>
                        <div class="analysis-card">
                            <h3>事件聚类</h3>
                            <div id="events-list" class="events-list"></div>
                        </div>
                        <div class="analysis-card">
                            <h3>情绪分布</h3>
                            <div id="sentiment-distribution" class="sentiment-chart"></div>
                        </div>
                        <div class="analysis-card">
                            <h3>词汇情绪感知</h3>
                            <div class="word-sentiment-form">
                                <input type="text" id="word-sentiment-input" class="form-control" placeholder="输入关键词分析情绪">
                                <button id="word-sentiment-btn" class="btn btn-primary">分析</button>
                            </div>
                            <div id="word-sentiment-result" class="word-sentiment-result hidden"></div>
                        </div>
                    </div>
                </div>

                <div id="summary-page" class="content-page hidden">
                    <div class="page-header">
                        <h2>智能摘要</h2>
                    </div>
                    <div class="summary-section">
                        <div class="summary-options">
                            <div class="option-group">
                                <label>摘要长度</label>
                                <select id="summary-length" class="form-control">
                                    <option value="short">短摘要（50字）</option>
                                    <option value="medium" selected>中摘要（150字）</option>
                                    <option value="long">长摘要（300字）</option>
                                </select>
                            </div>
                            <div class="option-group">
                                <label>语言风格</label>
                                <select id="summary-style" class="form-control">
                                    <option value="neutral" selected>中性客观</option>
                                    <option value="formal">正式严谨</option>
                                    <option value="concise">简洁精炼</option>
                                    <option value="vivid">生动活泼</option>
                                    <option value="analytical">分析深入</option>
                                </select>
                            </div>
                        </div>

                        <div class="summary-input-section">
                            <div class="input-tabs">
                                <button class="tab-btn active" data-tab="url">URL导入</button>
                                <button class="tab-btn" data-tab="text">直接输入</button>
                                <button class="tab-btn" data-tab="doc">文档导入</button>
                            </div>
                            
                            <div class="tab-content" id="url-tab">
                                <input type="text" id="summary-url" class="form-control" placeholder="请输入新闻文章URL">
                                <button id="summary-url-btn" class="btn btn-primary">导入并生成摘要</button>
                            </div>
                            
                            <div class="tab-content hidden" id="text-tab">
                                <input type="text" id="summary-title" class="form-control" placeholder="文章标题（可选）">
                                <textarea id="summary-content" class="form-control" placeholder="请输入文章内容" rows="8"></textarea>
                                <button id="summary-generate-btn" class="btn btn-primary">生成摘要和标题</button>
                            </div>
                            
                            <div class="tab-content hidden" id="doc-tab">
                                <div class="doc-upload-area" id="doc-upload-area">
                                    <i class="fa-solid fa-file-upload"></i>
                                    <p>点击选择文档或拖拽文件到此处</p>
                                    <input type="file" id="doc-file-input" accept=".txt,.doc,.docx,.pdf" class="hidden">
                                </div>
                                <div id="doc-preview" class="doc-preview hidden">
                                    <div class="doc-info">
                                        <i class="fa-solid fa-file-alt"></i>
                                        <span id="doc-filename"></span>
                                        <button id="doc-clear-btn" class="btn btn-sm btn-outline-danger">清除</button>
                                    </div>
                                    <div id="doc-content-preview" class="doc-content-preview"></div>
                                    <button id="doc-generate-btn" class="btn btn-primary">生成摘要和标题</button>
                                </div>
                            </div>
                        </div>

                        <div id="summary-result" class="summary-result hidden">
                                <div class="result-header">
                                    <h4>生成结果</h4>
                                    <div class="result-actions">
                                        <button id="speak-btn" class="btn btn-sm btn-outline-success" title="朗读摘要">
                                            <i class="fa-solid fa-volume-high"></i> 朗读
                                        </button>
                                        <button id="stop-speak-btn" class="btn btn-sm btn-outline-warning hidden" title="停止朗读">
                                            <i class="fa-solid fa-volume-xmark"></i> 停止
                                        </button>
                                        <button id="copy-all-btn" class="btn btn-sm btn-outline-secondary">
                                            <i class="fa-solid fa-copy"></i> 复制全部
                                        </button>
                                    </div>
                                </div>
                            <div class="result-section">
                                <label>生成的标题</label>
                                <div id="generated-title" class="generated-title"></div>
                            </div>
                            <div class="summary-tabs">
                                <button class="summary-tab-btn active" data-summary="short">短摘要</button>
                                <button class="summary-tab-btn" data-summary="medium">中摘要</button>
                                <button class="summary-tab-btn" data-summary="long">长摘要</button>
                            </div>
                            <div class="summary-content">
                                <div id="summary-short-content" class="summary-text"></div>
                                <div id="summary-medium-content" class="summary-text hidden"></div>
                                <div id="summary-long-content" class="summary-text hidden"></div>
                            </div>
                            <div class="sentiment-info">
                                <h4>情绪分析</h4>
                                <div id="sentiment-result"></div>
                            </div>
                            <div class="category-info">
                                <div id="category-result"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>

        <div id="article-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modal-title">文章详情</h3>
                    <button id="close-modal" class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <div id="modal-content"></div>
                </div>
            </div>
        </div>

        <div id="source-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="source-modal-title">添加信源</h3>
                    <button id="close-source-modal" class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="source-form">
                        <div class="form-group">
                            <label for="source-name">名称</label>
                            <input type="text" id="source-name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="source-url">网址</label>
                            <input type="url" id="source-url" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="source-type">类型</label>
                            <select id="source-type" class="form-control">
                                <option value="website">网站</option>
                                <option value="rss">RSS</option>
                                <option value="wechat">公众号</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="source-rss">RSS地址（可选）</label>
                            <input type="url" id="source-rss" class="form-control">
                        </div>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </form>
                </div>
            </div>
        </div>

        <div id="user-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="user-modal-title">添加用户</h3>
                    <button id="close-user-modal" class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="user-form">
                        <div class="form-group">
                            <label for="user-username">用户名</label>
                            <input type="text" id="user-username" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="user-password">密码</label>
                            <input type="password" id="user-password" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="user-role">角色</label>
                            <select id="user-role" class="form-control">
                                <option value="user">普通用户</option>
                                <option value="admin">管理员</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </form>
                </div>
            </div>
        </div>

        <div id="crawl-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="crawl-modal-title">直接爬取网址</h3>
                    <button id="close-crawl-modal" class="close-btn">&times;</button>
                </div>
                <div class="modal-body">
                    <form id="crawl-form">
                        <div class="form-group">
                            <label for="crawl-url">网址</label>
                            <input type="url" id="crawl-url" class="form-control" placeholder="https://example.com" required>
                        </div>
                        <div class="form-group">
                            <label for="crawl-depth">爬取深度</label>
                            <select id="crawl-depth" class="form-control">
                                <option value="1">1层</option>
                                <option value="2" selected>2层</option>
                                <option value="3">3层</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="crawl-limit">最大文章数</label>
                            <input type="number" id="crawl-limit" class="form-control" value="10" min="1" max="50">
                        </div>
                        <button type="submit" class="btn btn-primary" id="start-crawl-btn">开始爬取</button>
                    </form>
                    <div id="crawl-progress" class="hidden">
                        <div class="progress">
                            <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                        </div>
                        <div id="crawl-status"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
