<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - CQUNEWS新闻聚合分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .forgot-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .forgot-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 400px;
            max-width: 90%;
        }
        .forgot-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .forgot-header i {
            font-size: 48px;
            color: #667eea;
        }
        .forgot-header h1 {
            font-size: 24px;
            margin-top: 15px;
            color: #333;
        }
        .forgot-header p {
            color: #666;
            font-size: 14px;
            margin-top: 10px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .btn-block {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .btn-block:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
        .error-message {
            color: #dc3545;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        .success-message {
            color: #28a745;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            cursor: pointer;
        }
        .back-link:hover {
            color: #764ba2;
        }
        .back-link i {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="forgot-container">
        <div class="forgot-card">
            <div class="forgot-header">
                <i class="fa-solid fa-lock"></i>
                <h1>忘记密码</h1>
                <p>请输入您的用户名，系统将为您重置密码</p>
            </div>
            <form id="forgot-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" class="form-control" placeholder="请输入用户名" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">重置密码</button>
            </form>
            <div id="forgot-error" class="error-message"></div>
            <div id="forgot-success" class="success-message" style="display:none;"></div>
            <a href="/" class="back-link">
                <i class="fa-solid fa-arrow-left"></i> 返回登录页面
            </a>
        </div>
    </div>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            
            const errorDiv = document.getElementById('forgot-error');
            const successDiv = document.getElementById('forgot-success');
            errorDiv.textContent = '';
            successDiv.style.display = 'none';
            
            if (!username) {
                errorDiv.textContent = '请输入用户名';
                return;
            }
            
            try {
                const response = await fetch('/auth/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username: username })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    successDiv.textContent = '密码重置成功！新密码已发送到您的账户，默认为123456';
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 3000);
                } else {
                    if (data.detail) {
                        errorDiv.textContent = data.detail;
                    } else {
                        errorDiv.textContent = '重置失败，请稍后重试';
                    }
                }
            } catch (error) {
                errorDiv.textContent = '网络错误，请检查连接';
            }
        });

        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-2px)';
            });
            btn.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0)';
            });
        });
    </script>
</body>
</html>
